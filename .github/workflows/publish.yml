name: Publish NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # required for NuGet Trusted Publishing OIDC token

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Restore dependencies
        run: cd FtrIO; dotnet restore

      - name: Build
        run: cd FtrIO; dotnet build --no-restore --configuration Release

      - name: Test
        run: cd FtrIO; dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#[vV]}"
          dotnet pack FtrIO/FtrIO/FtrIO.csproj --no-build --configuration Release -p:PackageVersion=$VERSION --output FtrIO/nupkgs

      - name: Get NuGet OIDC token
        id: oidc
        run: |
          TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=nuget.org" \
            | jq -r '.value')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Push to NuGet
        run: dotnet nuget push "FtrIO/nupkgs/*.nupkg" --api-key ${{ steps.oidc.outputs.token }} --source https://api.nuget.org/v3/index.json --skip-duplicate
