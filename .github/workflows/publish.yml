name: Publish NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write # required for NuGet Trusted Publishing OIDC token

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Restore dependencies
        run: cd FtrIO; dotnet restore

      - name: Build
        run: cd FtrIO; dotnet build --no-restore --configuration Release

      - name: Test
        run: cd FtrIO; dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#[vV]}"
          dotnet pack FtrIO/FtrIO/FtrIO.csproj --no-build --configuration Release -p:PackageVersion=$VERSION --output FtrIO/nupkgs
          dotnet pack FtrIO/FtrIO.Providers.Http/FtrIO.Providers.Http.csproj --no-build --configuration Release -p:PackageVersion=$VERSION --output FtrIO/nupkgs
          dotnet pack FtrIO/FtrIO.Providers.AzureAppConfig/FtrIO.Providers.AzureAppConfig.csproj --no-build --configuration Release -p:PackageVersion=$VERSION --output FtrIO/nupkgs

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "FtrIO/nupkgs/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
